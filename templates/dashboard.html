<!DOCTYPE html>
<html>
<head><meta charset="utf-8">
<title>Dashboard</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="box">
<h2>Welcome {{name}}</h2>
<a href="/quiz">Start Quiz</a> |
<a href="/logout">Logout</a>

<h3>Previous Attempts</h3>
<table>
<tr>
<th>Score</th>
<th>Date</th>
</tr>
        {% for r in results %}
<tr>
<td>{{r[0]}}</td>
<td>{{r[1]}}</td>
</tr>
        {% endfor %}
</table>
</div>
</body>
</html>
